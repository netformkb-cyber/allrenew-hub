<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>올리뉴 파트너 허브</title>
<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg:#f5f6f8;--card:#fff;--line:#e6e9ee;--line2:#eef0f3;
  --ink:#161c26;--ink2:#525c6b;--ink3:#929baa;
  --accent:#2f6bff;--accent-soft:#eef3ff;--head:#141b27;--radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{font-family:'Pretendard','Malgun Gothic','맑은 고딕',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--ink);font-size:15.5px;-webkit-font-smoothing:antialiased;}
input,textarea,select,button{font-family:inherit;color:inherit;}
textarea{resize:vertical;}::placeholder{color:#bcc3cf;}

.header{background:var(--head);color:#fff;padding:0 28px;height:60px;display:flex;align-items:center;gap:15px;position:sticky;top:0;z-index:100;}
.header h1{font-size:1.12rem;font-weight:800;cursor:pointer;white-space:nowrap;letter-spacing:-.01em;}
.header h1 i{font-style:normal;opacity:.45;font-weight:400;font-size:.92rem;}
.crumb{font-size:.9rem;color:#aeb8c6;}.crumb b{color:#fff;font-weight:600;}
.header-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.badge{font-size:.8rem;color:#aeb8c6;padding:6px 11px;border-radius:7px;background:rgba(255,255,255,.07);white-space:nowrap;}
.badge.syncing{color:#fcd34d;}.badge.synced{color:#6ee7b7;}.badge.error{color:#fca5a5;}
.tbtn{border:none;border-radius:8px;padding:8px 15px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.15s;}
.tbtn.ghost{background:rgba(255,255,255,.1);color:#e9edf3;}.tbtn.ghost:hover{background:rgba(255,255,255,.18);}
.tbtn.save{background:var(--accent);color:#fff;}.tbtn.save:hover{background:#245ce0;}

.wrap{max-width:1360px;margin:0 auto;padding:30px 30px 80px;}
.page-h{margin-bottom:22px;}
.page-h h2{font-size:1.85rem;font-weight:800;letter-spacing:-.02em;}
.page-h p{font-size:.98rem;color:var(--ink2);margin-top:7px;}

.kpi-row{display:grid;grid-template-columns:repeat(5,1fr);gap:14px;margin-bottom:26px;}
.kpi{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:19px 22px;cursor:pointer;transition:.15s;}
.kpi:hover{border-color:#cfd6e0;}
.kpi.on{border-color:var(--accent);box-shadow:0 0 0 2px var(--accent-soft);}
.kpi .num{font-size:2.1rem;font-weight:800;line-height:1;letter-spacing:-.02em;}
.kpi .lbl{font-size:.9rem;color:var(--ink2);margin-top:9px;display:flex;align-items:center;gap:7px;}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;}

.vswitch{display:inline-flex;background:#e9ebef;border-radius:11px;padding:4px;margin-bottom:20px;}
.vswitch button{border:none;background:transparent;padding:10px 22px;font-size:.92rem;font-weight:600;color:var(--ink2);cursor:pointer;border-radius:8px;}
.vswitch button.on{background:#fff;color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.09);}

.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:15px;flex-wrap:wrap;}
.search{flex:1;min-width:240px;}
.search input{width:100%;border:1px solid var(--line);border-radius:11px;padding:13px 16px;font-size:.98rem;background:#fff;}
.search input:focus{outline:none;border-color:var(--accent);}
.fsel{border:1px solid var(--line);border-radius:11px;padding:13px 15px;font-size:.94rem;background:#fff;cursor:pointer;}
.fsel:focus{outline:none;border-color:var(--accent);}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px;}
.chip-f{border:1px solid var(--line);background:#fff;color:var(--ink2);border-radius:22px;padding:8px 17px;font-size:.88rem;font-weight:600;cursor:pointer;transition:.12s;}
.chip-f:hover{border-color:#cfd6e0;}.chip-f.on{background:var(--head);color:#fff;border-color:var(--head);}

.list{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden;}
.list-head{display:grid;grid-template-columns:185px 1fr 84px 116px 36px;gap:14px;padding:14px 24px;background:#fafbfc;border-bottom:1px solid var(--line);font-size:.84rem;color:var(--ink2);font-weight:600;}
.row{border-bottom:1px solid var(--line2);}.row:last-child{border-bottom:none;}
.row-main{display:grid;grid-template-columns:185px 1fr 84px 116px 36px;gap:14px;padding:18px 24px;align-items:center;cursor:pointer;transition:.1s;}
.row-main:hover{background:#fafbfc;}.row.open>.row-main{background:#f6f9ff;}
.rcat{display:flex;align-items:center;gap:8px;font-size:.9rem;color:var(--ink2);min-width:0;}
.rcat .chip{width:9px;height:9px;border-radius:3px;flex-shrink:0;}
.rcat .gname{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.rname{font-weight:700;font-size:1.06rem;}.rname .note{font-weight:400;color:var(--ink3);font-size:.86rem;margin-left:7px;}
.rmeta{font-size:.92rem;color:var(--ink2);}.rmeta.muted{color:#c4cbd6;}
.rcount{font-size:.92rem;color:var(--ink2);}
.chev{color:#cdd5e0;font-size:.74rem;transition:.2s;justify-self:end;}
.row.open .chev{transform:rotate(180deg);}
.empty{text-align:center;color:var(--ink3);padding:46px 0;font-size:.92rem;}

.st{display:inline-flex;align-items:center;gap:7px;padding:5px 13px;border-radius:22px;font-size:.82rem;font-weight:600;white-space:nowrap;}
.st::before{content:'';width:7px;height:7px;border-radius:50%;background:currentColor;}
.st-candidate{background:#f1f3f6;color:#6b7280;}.st-contacted{background:#eaf1ff;color:#2f6bff;}
.st-meeting{background:#f0ebff;color:#7c4dff;}.st-review{background:#fff5e6;color:#e08600;}
.st-selected{background:#e6f7ee;color:#0a9d54;}.st-hold{background:#fdecec;color:#dc2626;}
select.st-sel{border:1px solid var(--line);border-radius:9px;padding:8px 13px;font-size:.88rem;font-weight:600;cursor:pointer;outline:none;background:#fff;}
select.st-sel:focus{border-color:var(--accent);}

.vbody{padding:10px 24px 26px;border-top:1px solid var(--line2);background:#fcfdfe;}
.vtabs{display:flex;align-items:center;gap:5px;margin:18px 0;}
.vtab{border:none;background:#e9ebef;color:var(--ink2);padding:10px 18px;border-radius:9px;font-size:.9rem;font-weight:600;cursor:pointer;}
.vtab.on{background:var(--head);color:#fff;}
.vtab-right{margin-left:auto;display:flex;align-items:center;gap:9px;}
.grid2{display:grid;grid-template-columns:repeat(2,1fr);gap:15px;}
.fld{display:flex;flex-direction:column;gap:7px;}.fld.full{grid-column:1/-1;}
.fld label{font-size:.86rem;font-weight:600;color:var(--ink2);}
.fld input,.fld textarea{border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:.96rem;background:#fff;width:100%;}
.fld input:focus,.fld textarea:focus{outline:none;border-color:var(--accent);}
.sbtn{border:1px solid var(--line);background:#fff;color:var(--ink2);border-radius:9px;padding:8px 15px;font-size:.86rem;cursor:pointer;font-weight:600;}
.sbtn:hover{background:#fafbfc;}.sbtn.danger{color:#dc2626;border-color:#f2c7c7;}.sbtn.danger:hover{background:#fdf2f2;}
.sbtn.primary{color:#fff;background:var(--accent);border-color:var(--accent);}.sbtn.primary:hover{background:#245ce0;}
.sbtn.primary:disabled{opacity:.6;cursor:default;}

.mtg{border:1px solid var(--line);border-radius:10px;margin-bottom:9px;background:#fff;}
.mtg-h{display:flex;align-items:center;gap:11px;padding:14px 16px;cursor:pointer;border-radius:10px;}
.mtg.open .mtg-h{border-bottom:1px solid var(--line2);border-radius:10px 10px 0 0;}
.mtg-h .mn{background:var(--head);color:#fff;border-radius:7px;padding:3px 10px;font-size:.78rem;font-weight:700;}
.mtg-h input.mt{border:none;background:transparent;font-weight:700;font-size:.98rem;flex:1;min-width:60px;}
.mtg-h input.mt:focus{outline:none;}.mtg-h .md{font-size:.84rem;color:var(--ink3);}
.mtg-h .mc{color:#cdd5e0;font-size:.74rem;transition:.2s;}.mtg.open .mc{transform:rotate(180deg);}
.mtg-b{display:none;padding:18px 16px;}.mtg.open .mtg-b{display:block;}

.ai-box{background:#f3f6fb;border:1px solid var(--line);border-radius:11px;padding:16px;}
.ai-h{font-size:.96rem;font-weight:700;margin-bottom:5px;}
.ai-d{font-size:.86rem;color:var(--ink2);margin-bottom:12px;line-height:1.5;}
.ai-box textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:.95rem;background:#fff;margin-bottom:12px;}
.ai-actions{display:flex;align-items:center;gap:11px;flex-wrap:wrap;}
.file-btn{display:inline-block;}
.file-tag{font-size:.86rem;color:var(--ink2);background:#fff;border:1px solid var(--line);border-radius:9px;padding:7px 12px;}
.file-tag b{cursor:pointer;color:#dc2626;margin-left:6px;font-weight:700;}

.add{width:100%;border:1.5px dashed #cdd5e0;background:#fff;color:var(--ink2);border-radius:10px;padding:13px;font-weight:600;cursor:pointer;font-size:.92rem;transition:.15s;}
.add:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}.add.mini{padding:11px;font-size:.9rem;}
.note-box{font-size:.88rem;color:var(--ink2);background:#fff;border:1px solid var(--line);border-radius:10px;padding:13px 15px;margin-bottom:16px;line-height:1.5;}
.mg{margin-bottom:17px;}.mg-t{font-size:.9rem;font-weight:700;margin-bottom:9px;}
.cklist{display:flex;flex-direction:column;gap:6px;}
.ckitem{display:flex;align-items:center;gap:12px;padding:11px 14px;border:1px solid var(--line2);border-radius:9px;background:#fff;}
.ckitem.done{background:#f4fbf7;border-color:#cdeede;}
.ckitem input[type=checkbox]{width:19px;height:19px;cursor:pointer;accent-color:#0a9d54;flex-shrink:0;}
.ckitem .cktext{flex:1;border:none;background:transparent;font-size:.95rem;padding:3px 0;min-width:0;}
.ckitem .cktext:focus{outline:none;}
.ckitem.done .cktext{color:#0a9d54;text-decoration:line-through;}
.ckdel{border:none;background:transparent;color:#c4cbd6;font-size:1.3rem;line-height:1;cursor:pointer;padding:0 5px;flex-shrink:0;}
.ckdel:hover{color:#dc2626;}

.cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:15px;}
.cat-card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:21px 22px 18px;cursor:pointer;transition:.16s;}
.cat-card:hover{border-color:#cfd6e0;box-shadow:0 8px 24px rgba(20,32,46,.08);transform:translateY(-2px);}
.cat-card .top{display:flex;align-items:center;gap:10px;margin-bottom:4px;}
.cat-card .chip{width:11px;height:11px;border-radius:3px;}.cat-card .nm{font-size:1.22rem;font-weight:700;}
.cat-card .edit{margin-left:auto;display:flex;gap:2px;opacity:0;transition:.15s;}.cat-card:hover .edit{opacity:1;}
.icon-btn{border:none;background:transparent;color:var(--ink3);cursor:pointer;font-size:.8rem;padding:4px 7px;border-radius:6px;}
.icon-btn:hover{background:var(--line2);color:var(--ink);}.icon-btn.del:hover{background:#fdeaea;color:#dc2626;}
.cat-card .sub{font-size:.86rem;color:var(--ink3);margin:3px 0 16px;min-height:18px;}
.cat-row{display:flex;gap:18px;margin-bottom:14px;}.cat-row .s{font-size:.86rem;color:var(--ink2);}.cat-row .s b{font-size:1.15rem;color:var(--ink);font-weight:700;margin-right:3px;}
.bar{height:6px;background:var(--line2);border-radius:3px;overflow:hidden;}.bar>div{height:100%;border-radius:3px;transition:width .3s;}
.add-cat{background:var(--card);border:1.5px dashed #cdd5e0;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--ink2);font-weight:600;cursor:pointer;font-size:.96rem;min-height:140px;transition:.15s;}
.add-cat:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.backbar{display:flex;align-items:center;gap:14px;margin-bottom:22px;}
.back{border:1px solid var(--line);background:#fff;color:var(--ink2);border-radius:9px;padding:9px 15px;font-size:.9rem;font-weight:600;cursor:pointer;}.back:hover{background:#fafbfc;}
.backbar h2{font-size:1.4rem;font-weight:800;display:flex;align-items:center;gap:10px;letter-spacing:-.01em;}
.backbar .cnt{font-size:.88rem;color:var(--ink3);font-weight:600;}
.group{margin-bottom:12px;}
.group-h{display:flex;align-items:center;gap:11px;margin:22px 0 11px;}
.group-h .gn{font-size:1.1rem;font-weight:700;}.group-h .gc{font-size:.82rem;color:var(--ink3);background:var(--line2);border-radius:22px;padding:3px 11px;font-weight:600;}
.group-h .ga{margin-left:auto;display:flex;gap:7px;}

.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(90px);background:var(--head);color:#fff;padding:14px 24px;border-radius:10px;font-size:.92rem;opacity:0;transition:.3s;z-index:300;font-weight:500;}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1;}.toast.error{background:#dc2626;}.toast.success{background:#0a9d54;}
.split{display:grid;grid-template-columns:360px 1fr;gap:16px;height:calc(100vh - 200px);min-height:520px;}
.pane{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);overflow:auto;}
.pane-l{padding:14px;}
.lgroup{margin-bottom:14px;}
.lgroup-h{display:flex;align-items:center;gap:8px;margin:4px 4px 8px;}
.lgroup-h .gn{font-size:1rem;font-weight:700;}
.lgroup-h .gc{font-size:.78rem;color:var(--ink3);background:var(--line2);border-radius:20px;padding:2px 9px;font-weight:600;}
.lgroup-h .ga{margin-left:auto;display:flex;gap:2px;}
.lrow{display:flex;align-items:center;gap:10px;padding:12px 13px;border-radius:9px;cursor:pointer;transition:.1s;}
.lrow:hover{background:#f6f8fb;}
.lrow.sel{background:var(--accent-soft);box-shadow:inset 3px 0 0 var(--accent);}
.ldot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.lname{font-weight:600;font-size:1rem;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.lname i{font-style:normal;color:var(--ink3);font-size:.84rem;margin-left:7px;font-weight:400;}
.lmtg{font-size:.8rem;color:var(--ink3);white-space:nowrap;}
.lst{font-size:.82rem;font-weight:600;white-space:nowrap;}
.lempty{font-size:.88rem;color:var(--ink3);padding:9px 13px;}
.ladd{width:100%;border:1px dashed #cdd5e0;background:#fff;color:var(--ink2);border-radius:9px;padding:11px;font-weight:600;cursor:pointer;font-size:.88rem;margin-top:6px;transition:.15s;}
.ladd:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}
.dhead{padding:22px 26px 0;}
.dh-grp{font-size:.88rem;color:var(--ink3);font-weight:600;}
.dh-name{display:block;font-size:1.55rem;font-weight:800;letter-spacing:-.01em;margin-top:4px;}
.dbody{padding:6px 26px 30px;}
.dbody .vtabs{margin-top:14px;}
.dempty{display:flex;align-items:center;justify-content:center;height:100%;color:var(--ink3);font-size:.98rem;}
.stepper{overflow-x:auto;padding:18px 2px 6px;}
.steps{display:flex;align-items:flex-start;min-width:max-content;}
.step{display:flex;flex-direction:column;align-items:center;gap:8px;padding:0 4px;width:104px;}
.step .sdot{width:32px;height:32px;border-radius:50%;background:#e6e9ee;color:var(--ink3);display:flex;align-items:center;justify-content:center;font-size:.84rem;font-weight:700;border:2px solid #e6e9ee;}
.step.done .sdot{background:#0a9d54;border-color:#0a9d54;color:#fff;}
.step.cur .sdot{background:#fff;border-color:var(--accent);color:var(--accent);box-shadow:0 0 0 4px var(--accent-soft);}
.step .slbl{font-size:.8rem;color:var(--ink2);text-align:center;font-weight:600;line-height:1.3;}
.step.done .slbl,.step.cur .slbl{color:var(--ink);}
.step .slbl em{display:block;font-style:normal;color:var(--accent);font-weight:700;font-size:.74rem;margin-top:2px;}
.sline{height:2px;background:#e6e9ee;flex:1;margin-top:15px;min-width:16px;}
.sline.done{background:#0a9d54;}

.roadmap{display:flex;flex-direction:column;gap:10px;}
.rstage{display:flex;gap:14px;}
.rs-num{width:30px;height:30px;border-radius:50%;background:#eef0f3;color:var(--ink3);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.86rem;flex-shrink:0;}
.rstage.done .rs-num{background:#0a9d54;color:#fff;}
.rs-body{flex:1;background:#fff;border:1px solid var(--line);border-radius:11px;padding:13px 15px;}
.rstage.done .rs-body{border-color:#cdeede;background:#f7fcf9;}
.rs-line{display:flex;align-items:center;gap:10px;}
.rs-check{display:flex;align-items:center;gap:9px;cursor:pointer;font-size:1rem;}
.rs-check input{width:19px;height:19px;accent-color:#0a9d54;cursor:pointer;}
.rs-date{border:1px solid var(--line);border-radius:8px;padding:7px 10px;font-size:.86rem;background:#fff;margin-left:auto;}
.rs-sub{font-size:.86rem;color:var(--accent);font-weight:600;}
.rs-hint{font-size:.84rem;color:var(--ink3);margin-top:8px;}
.rchips{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.rchip{font-size:.8rem;background:#f0ebff;color:#7c4dff;border-radius:20px;padding:4px 11px;font-weight:600;}
.testcard{border:1px solid var(--line);border-radius:10px;padding:12px;margin-top:9px;background:#fcfdfe;}
.test-h{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
.test-h .mn{background:#e08600;color:#fff;border-radius:7px;padding:3px 11px;font-size:.8rem;font-weight:700;}
.testcard>textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:10px 12px;font-size:.92rem;background:#fff;}
.test-files{margin-top:11px;}
.tf-t{font-size:.84rem;font-weight:700;color:var(--ink2);margin-bottom:7px;}
.tf-row{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.tf-label{width:38%;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:.86rem;background:#fff;}
.tf-url{flex:1;border:1px solid var(--line);border-radius:7px;padding:8px 10px;font-size:.86rem;background:#fff;}
.tf-open{font-size:.82rem;color:var(--accent);font-weight:600;text-decoration:none;white-space:nowrap;padding:0 4px;}
.lasg{font-size:.8rem;color:var(--ink2);background:#eef0f3;border-radius:20px;padding:3px 10px;white-space:nowrap;font-weight:600;}
.asg-badge{font-size:.78rem;font-weight:700;color:var(--accent);background:var(--accent-soft);border-radius:20px;padding:3px 11px;margin-left:9px;vertical-align:middle;white-space:nowrap;}
.dh-name .asg-badge{font-size:.84rem;}
.fld-sel{border:1px solid var(--line);border-radius:9px;padding:12px 14px;font-size:.96rem;background:#fff;cursor:pointer;}
.fld-sel:focus{outline:none;border-color:var(--accent);}
.maillog{display:flex;flex-direction:column;gap:5px;margin-top:11px;}
.ml-row{font-size:.83rem;color:var(--ink2);background:#fff;border:1px solid var(--line2);border-radius:8px;padding:7px 11px;}
.modal-bg{position:fixed;inset:0;background:rgba(20,27,39,.5);display:flex;align-items:center;justify-content:center;z-index:400;padding:20px;}
.modal{background:#fff;border-radius:14px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 20px 60px rgba(20,32,46,.3);}
.modal-h{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:1px solid var(--line);font-size:1.12rem;font-weight:800;}
.modal-b{padding:18px 22px;overflow:auto;display:flex;flex-direction:column;gap:13px;}
.modal-f{display:flex;align-items:center;gap:10px;padding:14px 22px;border-top:1px solid var(--line);}
.modal-f .mstatus{flex:1;font-size:.84rem;color:var(--ink2);}
.mfiles{display:flex;flex-wrap:wrap;gap:6px;}
.mfile{font-size:.82rem;background:#eef0f3;border-radius:7px;padding:5px 11px;}
.mfile b{cursor:pointer;color:#dc2626;margin-left:5px;font-weight:700;}
.tpl-hint{font-size:.82rem;color:var(--ink2);background:#f3f6fb;border:1px solid var(--line);border-radius:9px;padding:11px 13px;line-height:1.5;}
.tpl-hint code{background:#fff;border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:.8rem;}
.sig-preview{border:1px solid var(--line);border-radius:9px;padding:13px 15px;background:#fafbfc;min-height:44px;}
.sig-text{font-size:.9rem;color:var(--ink2);line-height:1.5;white-space:pre-wrap;margin-bottom:9px;}
.sig-card{max-width:340px;max-height:200px;width:auto;height:auto;object-fit:contain;border:1px solid var(--line);border-radius:8px;display:block;}
.sig-edit-link{margin-top:9px;}
.sig-edit-link b,.sig-empty b{color:var(--accent);cursor:pointer;font-weight:700;}
.sig-empty{font-size:.88rem;color:var(--ink3);}
.sig-cardbox{margin-top:10px;display:flex;flex-direction:column;align-items:flex-start;gap:9px;}
.mproposal{min-height:20px;}
.lbl-hint{font-weight:400;color:var(--ink3);font-size:.8rem;}
.cardbox{display:flex;flex-direction:column;align-items:flex-start;gap:9px;}
.vcard-img{position:relative;display:inline-block;}
.vcard-img img{max-width:360px;max-height:210px;width:auto;height:auto;border:1px solid var(--line);border-radius:8px;display:block;}
.vcard-img .ckdel{position:absolute;top:6px;right:6px;background:#fff;border:1px solid var(--line);border-radius:50%;width:24px;height:24px;line-height:1;}
.vfiles{margin-top:9px;display:flex;flex-direction:column;gap:5px;}
.vf-row{display:flex;align-items:center;gap:9px;background:#fff;border:1px solid var(--line);border-radius:8px;padding:8px 11px;}
.vf-ic{font-size:1rem;}
.vf-name{font-size:.9rem;font-weight:600;color:var(--accent);text-decoration:none;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0;}
.vf-name:hover{text-decoration:underline;}
.vf-meta{font-size:.78rem;color:var(--ink3);white-space:nowrap;}
.ml-open{font-size:.78rem;color:var(--ink3);margin-left:4px;}
.ml-open.on{color:#0a8a3f;font-weight:700;}

/* CATEGORY → VENDOR CARDS */
.vsec{margin-bottom:26px;}
.vsec-h{display:flex;align-items:center;gap:11px;margin:0 2px 13px;}
.vsec-h .gn{font-size:1.12rem;font-weight:700;}
.vsec-h .gc{font-size:.8rem;color:var(--ink3);background:var(--line2);border-radius:20px;padding:3px 11px;font-weight:600;}
.vsec-h .ga{margin-left:auto;display:flex;gap:3px;}
.vcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.vcard{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px 16px;cursor:pointer;transition:.16s;position:relative;}
.vcard:hover{border-color:#cfd6e0;box-shadow:0 8px 24px rgba(20,32,46,.08);transform:translateY(-2px);}
.vcard .vc-top{display:flex;align-items:center;gap:9px;margin-bottom:9px;padding-right:82px;}
.vc-home{position:absolute;top:14px;right:14px;display:inline-flex;align-items:center;font-size:.72rem;font-weight:700;color:var(--accent);background:var(--accent-soft);border:1px solid #d6e0ff;border-radius:20px;padding:4px 10px;text-decoration:none;transition:.14s;z-index:2;white-space:nowrap;}
.vc-home:hover{background:var(--accent);color:#fff;border-color:var(--accent);}
.vcard .vc-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.vcard .vc-name{font-size:1.14rem;font-weight:700;letter-spacing:-.01em;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vcard .vc-note{font-size:.84rem;color:var(--ink3);margin-bottom:12px;min-height:17px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.vcard .vc-foot{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.vcard .vc-mtg{font-size:.8rem;color:var(--ink3);}
.vadd-card{background:var(--card);border:1.5px dashed #cdd5e0;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;color:var(--ink2);font-weight:600;cursor:pointer;font-size:.92rem;min-height:118px;transition:.15s;}
.vadd-card:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-soft);}

/* VENDOR DETAIL PAGE */
.vp-head{display:flex;align-items:center;gap:13px;margin-bottom:6px;flex-wrap:wrap;}
.vp-head h2{font-size:1.55rem;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:11px;}
.vp-head .vp-right{margin-left:auto;display:flex;align-items:center;gap:9px;}
.vp-grp{font-size:.88rem;color:var(--ink3);font-weight:600;margin:2px 2px 16px;}
.vp-stepper{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:6px 20px 10px;margin-bottom:18px;}
.vp-split{display:grid;grid-template-columns:216px 1fr;gap:16px;align-items:start;}
.vp-nav{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:10px;position:sticky;top:80px;}
.vp-nav button{display:flex;align-items:center;gap:10px;width:100%;border:none;background:transparent;color:var(--ink2);text-align:left;padding:13px 14px;border-radius:10px;font-size:.98rem;font-weight:600;cursor:pointer;transition:.12s;margin-bottom:2px;}
.vp-nav button:hover{background:#f6f8fb;}
.vp-nav button.on{background:var(--accent-soft);color:var(--accent);box-shadow:inset 3px 0 0 var(--accent);}
.vp-nav button .npill{margin-left:auto;font-size:.76rem;background:var(--line2);color:var(--ink2);border-radius:20px;padding:2px 9px;font-weight:700;}
.vp-nav button.on .npill{background:#fff;color:var(--accent);}
.vp-content{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:22px 24px;min-height:340px;}

@media(max-width:920px){.kpi-row{grid-template-columns:repeat(2,1fr);}.cat-grid{grid-template-columns:1fr;}.grid2{grid-template-columns:1fr;}
  .list-head{display:none;}.row-main{grid-template-columns:1fr auto;gap:8px;row-gap:7px;}.rcat{grid-column:1/-1;}.rmeta,.rcount{display:none;}
  .split{grid-template-columns:1fr;height:auto;}.pane-l{max-height:330px;}.pane-r{min-height:300px;}
  .vcard-grid{grid-template-columns:1fr;}
  .vp-split{grid-template-columns:1fr;}.vp-nav{position:static;display:flex;flex-wrap:wrap;gap:5px;}.vp-nav button{width:auto;margin-bottom:0;}.vp-nav button.on{box-shadow:none;}}
</style>

async function runOneTimeCleanup(data){
  const KEY='__mailclean_v1__';
  if(!sb||!data)return;
  if(data.find(r=>r.id===KEY))return;
  categories.forEach(c=>c.groups.forEach(g=>g.vendors.forEach(vn=>{
    if(Array.isArray(vn.mailLog)&&vn.mailLog.length)vn.mailLog=[];
  })));
  try{
    for(const c of categories){await sb.from(TABLE).upsert({id:c.id,name:c.name,data:{name:c.name,color:c.color,groups:c.groups},updated_at:new Date().toISOString()});}
    await sb.from(TABLE).upsert({id:KEY,name:'mailclean',data:{done:true},updated_at:new Date().toISOString()});
  }catch(e){}
}

function waitFor(cond,ms=9000){return new Promise(res=>{const t=Date.now();(function loop(){if(cond())return res(true);if(Date.now()-t>ms)return res(false);setTimeout(loop,60);})();});}
async function bootCloud(){
  const ready=await waitFor(()=>window.supabase&&window.supabase.createClient);
  if(!ready){cloudOK=false;setSync('local');return;}
  try{sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);}catch(e){cloudOK=false;setSync('local');return;}
  const touched=userTouched; // 부팅 중 사용자가 이미 편집했으면 클라우드 데이터로 덮어쓰지 않음
  await loadAll(!touched);
  if(!touched){
    if(currentVendorId&&locateVendor(currentVendorId))renderVendorPage(currentVendorId);
    else if(currentCatId&&cat(currentCatId))renderCategory(currentCatId);
    else goHome();
  }
}
async function loadAll(apply=true){
  if(!sb){cloudOK=false;setSync('local');return;}
  setSync('syncing');
  try{
    const {data,error}=await sb.from(TABLE).select('*').neq('id','__proposal__');
    if(error)throw error;
    if(apply){
      if(data&&data.length){
        const seen=new Set();categories=[];
        DEFAULT.forEach(def=>{const r=data.find(x=>x.id===def.id);if(r&&r.data){categories.push({id:def.id,name:r.data.name||def.name,color:r.data.color||def.color,groups:r.data.groups||def.groups});}else categories.push(def);seen.add(def.id);});
        data.forEach(r=>{if(!seen.has(r.id)&&r.data&&!String(r.id).startsWith('__'))categories.push({id:r.id,name:r.data.name,color:r.data.color||'#5b6472',groups:r.data.groups||[]});});
        const tpl=data.find(r=>r.id==='__mailtpl__');if(tpl&&tpl.data)mailTemplate={subject:tpl.data.subject||'',body:tpl.data.body||DEFAULT_MAIL_BODY,attachments:tpl.data.attachments||[],proposalName:tpl.data.proposalName||''};
        if(repairTemplate()){try{await sb.from(TABLE).upsert({id:'__mailtpl__',name:'mail_template',data:mailTemplate,updated_at:new Date().toISOString()});}catch(e){}}
        const sig=data.find(r=>r.id==='__signatures__');if(sig&&sig.data)signatures=sig.data||{};
        applyVendorLinks();
        migrateStatus();
        await runOneTimeCleanup(data);
        localStorage.setItem('ollinew-data',JSON.stringify(categories));
      }
    }
    cloudOK=true;setSync('synced');
  }catch(e){cloudOK=false;setSync('local');}
}

function scheduleSave(){userTouched=true;document.getElementById('saveBtn').innerHTML='변경됨';clearTimeout(saveTimer);saveTimer=setTimeout(saveCurrent,1100);}
async function saveCurrent(){
  localStorage.setItem('ollinew-data',JSON.stringify(categories));
  if(!cloudOK||!sb){flashSaved();return;}
  setSync('syncing');
  try{const targets=currentCatId?categories.filter(c=>c.id===currentCatId):categories;
    for(const c of targets){const {error}=await sb.from(TABLE).upsert({id:c.id,name:c.name,data:{name:c.name,color:c.color,groups:c.groups},updated_at:new Date().toISOString()});if(error)throw error;}
    setSync('synced');flashSaved();
  }catch(e){cloudOK=false;setSync('error');toast('클라우드 저장 실패 — 로컬에 저장됨','error');}
}
function flashSaved(){const b=document.getElementById('saveBtn');b.innerHTML='저장됨';setTimeout(()=>b.innerHTML='저장',1600);}
function setSync(s){const b=document.getElementById('syncBadge');const m={syncing:['동기화 중','syncing'],synced:['동기화됨','synced'],error:['동기화 오류','error'],local:['로컬 저장 (테이블 미생성)','error']};const[t,c]=m[s]||['클라우드',''];b.textContent=t;b.className='badge '+c;if(s==='synced')setTimeout(()=>{if(b.className.includes('synced'))b.textContent='클라우드 연결됨';},2200);}

function cat(id){return categories.find(c=>c.id===id);}
function allV(c){return c.groups.flatMap(g=>g.vendors);}
function catStats(c){const vs=allV(c);return{total:vs.length,prog:vs.filter(x=>['contacted','meeting','review'].includes(x.status)).length,selected:vs.filter(x=>x.status==='selected').length,hold:vs.filter(x=>x.status==='hold').length};}
function gStats(){const vs=categories.flatMap(allV);return{total:vs.length,prog:vs.filter(x=>['contacted','meeting','review'].includes(x.status)).length,selected:vs.filter(x=>x.status==='selected').length,hold:vs.filter(x=>x.status==='hold').length,cand:vs.filter(x=>x.status==='candidate').length};}
function ensureFiles(vn){if(!Array.isArray(vn.files))vn.files=[];return vn.files;}
function deriveStatus(vn){if(vn.hold)return 'hold';const r=ensureRoadmap(vn);if(r.contract.done||r.launch.done||(r.tests&&r.tests.length>0))return 'selected';if(vn.meetings&&vn.meetings.length>0)return 'meeting';if(r.call.done||r.proposal.done||r.catalog.done||ensureFiles(vn).length>0)return 'contacted';return 'candidate';}
function refreshStatus(vn){vn.status=deriveStatus(vn);}
function migrateStatus(){categories.forEach(c=>c.groups.forEach(g=>g.vendors.forEach(vn=>{if(vn.status==='hold')vn.hold=true;refreshStatus(vn);})));}
function matProg(vn){const all=Array.isArray(vn.checklist)?vn.checklist:[];return{done:all.filter(i=>i.done).length,total:all.length};}
function flatRows(){const r=[];categories.forEach(c=>c.groups.forEach((g,gi)=>g.vendors.forEach((vn,vi)=>r.push({c,g,gi,vn,vi}))));return r;}
function locateVendor(id){for(const c of categories){for(let gi=0;gi<c.groups.length;gi++){const g=c.groups[gi];for(let vi=0;vi<g.vendors.length;vi++){if(g.vendors[vi].id===id)return{c,cid:c.id,g,gi,vn:g.vendors[vi],vi};}}}return null;}
function fmtOpen(iso){try{const d=new Date(iso);const p=n=>String(n).padStart(2,'0');return `${p(d.getMonth()+1)}/${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`;}catch(e){return '';}}
function openBadge(tid){
  if(!tid)return '';
  const o=openCache[tid];
  if(o&&o.first)return `<span class="ml-open on" title="열람 ${o.count}회">✓ 열람 ${fmtOpen(o.first)}</span>`;
  return `<span class="ml-open" title="열람 신호 없음(이미지 차단 시 확인 안 될 수 있음)">· 열람 미확인</span>`;
}
async function fetchOpens(vid){
  if(!sb||!vid||opensFetched[vid])return;
  opensFetched[vid]=true;
  try{
    const {data}=await sb.from('mail_opens').select('tracking_id,opened_at').eq('vendor_id',vid);
    (data||[]).forEach(o=>{const c=openCache[o.tracking_id]||{count:0,first:null};c.count++;if(!c.first||o.opened_at<c.first)c.first=o.opened_at;openCache[o.tracking_id]=c;});
    if(data&&data.length&&currentVendorId===vid)renderVendorPage(vid);
  }catch(e){}
}
function meetingContent(mt){if(mt.content)return mt.content;let out=[];if(mt.notes)Object.values(mt.notes).forEach(x=>{if(x&&x.trim())out.push(x.trim());});if(mt.summary&&mt.summary.trim())out.push(mt.summary.trim());return out.join('\n');}

function statusMatch(st){if(fStatus==='all')return true;if(fStatus==='progress')return['contacted','meeting','review'].includes(st);return st===fStatus;}
function renderRows(){
  let rows=flatRows();
  if(fCat!=='all')rows=rows.filter(r=>r.c.id===fCat);
  if(fAssignee!=='all')rows=rows.filter(r=>fAssignee==='__none__'?!r.vn.info.assignee:r.vn.info.assignee===fAssignee);
  rows=rows.filter(r=>statusMatch(r.vn.status));
  if(fSearch.trim()){const q=fSearch.trim().toLowerCase();rows=rows.filter(r=>{const v=r.vn;return[v.name,v.note,v.info.assignee,v.info.contactName,v.info.products,v.info.memo,r.g.name,r.c.name].some(x=>(x||'').toLowerCase().includes(q));});}

function ensureRoadmap(vn){if(!vn.roadmap)vn.roadmap={call:{done:false,date:''},proposal:{done:false,date:''},catalog:{done:false,date:''},contract:{done:false,date:''},launch:{done:false,date:''},tests:[]};if(!Array.isArray(vn.roadmap.tests))vn.roadmap.tests=[];return vn.roadmap;}
function roadmapNodes(vn){const r=ensureRoadmap(vn);return[
  {label:'전화 연락',done:r.call.done},
  {label:'제안서 메일',done:r.proposal.done},
  {label:'카달로그·자료',done:r.catalog.done||ensureFiles(vn).length>0,sub:ensureFiles(vn).length?ensureFiles(vn).length+'건':''},
  {label:'미팅',done:vn.meetings.length>0,sub:vn.meetings.length?vn.meetings.length+'차':''},
  {label:'계약',done:r.contract.done},
  {label:'제품테스트',done:r.tests.length>0,sub:r.tests.length?r.tests.length+'차':''},
  {label:'제품출시',done:r.launch.done}
];}
function renderStepper(vn){
  const nodes=roadmapNodes(vn);let cur=nodes.findIndex(n=>!n.done);if(cur<0)cur=nodes.length;
  let html='';
  nodes.forEach((n,i)=>{
    if(i>0)html+=`<div class="sline ${nodes[i-1].done?'done':''}"></div>`;
    const cls=n.done?'done':(i===cur?'cur':'');
    html+=`<div class="step ${cls}"><div class="sdot">${n.done?'✓':(i+1)}</div><div class="slbl">${n.label}${n.sub?`<em>${n.sub}</em>`:''}</div></div>`;
  });
  return `<div class="steps">${html}</div>`;
}

async function onVendorFiles(cid,gi,vi,input){
  const files=Array.from(input.files||[]);if(!files.length)return;
  const vn=cat(cid).groups[gi].vendors[vi];
  if(!sb){toast('클라우드에 연결되지 않아 업로드할 수 없습니다','error');input.value='';return;}
  fileBusy[vn.id]=true;rerender();
  let ok=0,fail=0,lastErr='';
  for(const f of files){
    if(f.size>50*1024*1024){fail++;lastErr='50MB 초과: '+f.name;continue;}
    const path=vn.id+'/'+safeKey(f.name);
    try{
      const {error}=await sb.storage.from(FILES_BUCKET).upload(path,f,{upsert:true,contentType:f.type||'application/octet-stream'});
      if(error)throw error;
      const {data}=sb.storage.from(FILES_BUCKET).getPublicUrl(path);
      ensureFiles(vn).push({id:ckId(),name:f.name,size:f.size,date:today(),path,url:data.publicUrl});
      ok++;
    }catch(e){fail++;lastErr=(e&&(e.message||e.error||e.statusCode))?String(e.message||e.error||e.statusCode):String(e);console.error('[upload]',e);}
  }
  input.value='';fileBusy[vn.id]=false;
  if(ok){refreshStatus(vn);scheduleSave();}
  rerender();
  if(ok&&!fail)toast(ok+'개 자료를 업로드했습니다','success');
  else if(ok&&fail)toast(ok+'개 성공 · '+fail+'개 실패 — '+lastErr,'error');
  else toast('업로드 실패 — '+lastErr,'error');
}

  try{

async function ensureProposalLoaded(){

  if(!sb){return null;}
  try{const {data}=await sb.from(TABLE).select('data').eq('id','__proposal__').maybeSingle();proposalCache=(data&&data.data&&data.data.content)?data.data:null;}

  if(!mailTemplate||!mailTemplate.body)return false;
  if(mailTemplate.body.indexOf('{담당자}')!==-1)return false;
  const fixed=mailTemplate.body.replace(/(기술연구소\s*)([^\s]{2,4})(입니다)/, (m,a,b,c)=>ASSIGNEES.includes(b)?a+'{담당자}'+c:m);
  if(fixed!==mailTemplate.body){mailTemplate.body=fixed;return true;}
  return false;
}
async function sendMail(){
  if(!mailCtx)return;
  const to=document.getElementById('mTo').value.trim();
  const subject=document.getElementById('mSubject').value.trim();
  const body=document.getElementById('mBody').value;
  const sender=document.getElementById('mSender').value;
  const sig=sigOf(sender);
  const signatureText=(sig.text||'');
  const signatureImage=sig.card?{filename:sig.card.filename,contentType:sig.card.contentType,content:sig.card.content}:null;
  if(!to){setMailStatus('받는사람을 입력하세요',true);return;}
  const {cid,gi,vi}=mailCtx;const vn=cat(cid).groups[gi].vendors[vi];
  const trackingId='trk_'+Date.now().toString(36)+Math.random().toString(36).slice(2,7);
  const totalKB=Math.round((mailFiles.reduce((s,f)=>s+(f.content?f.content.length:0),0)+(signatureImage?signatureImage.content.length:0))*0.75/1024);
  if(totalKB>9000){setMailStatus(`첨부 용량이 너무 큽니다(약 ${Math.round(totalKB/1024)}MB). 9MB 이하로 줄여 주세요`,true);return;}
  const b=document.getElementById('mSend');b.disabled=true;b.textContent='발송 중...';setMailStatus('발송 중...',false);
  try{
    const res=await fetch(MAIL_FUNCTION_URL,{method:'POST',headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY},body:JSON.stringify({to,subject,body,attachments:mailFiles.map(({_proposal,...a})=>a),signatureText,signatureImage,trackingId,vendorId:vn.id,vendorName:vn.name})});
    const data=await res.json().catch(()=>({}));
    if(!res.ok||data.ok===false)throw new Error(data.error||('HTTP '+res.status));
    const r=ensureRoadmap(vn);r.proposal.done=true;if(!r.proposal.date)r.proposal.date=today();
    vn.mailLog=vn.mailLog||[];vn.mailLog.push({date:today(),to,subject,sender,trackingId});
    if(sender&&!vn.info.assignee)vn.info.assignee=sender;
    if(to)vn.info.email=to;
    refreshStatus(vn);
    scheduleSave();closeMail();rerender();toast('메일을 발송했습니다 · 사본이 공용메일로 전송됩니다','success');
  }catch(e){setMailStatus('발송 실패: '+e.message+' · 발송 함수 설정을 확인하세요',true);b.disabled=false;b.textContent='발송';}
}

/* CATEGORY CRUD */
function addCategory(){const n=prompt('새 분야 이름 (예: 조명)');if(!n)return;const id='c_'+Math.random().toString(36).slice(2,9);categories.push({id,name:n.trim(),color:PALETTE[categories.length%PALETTE.length],groups:[]});scheduleSave();goHome();toast('분야가 추가되었습니다','success');}
function renameCategory(id){const c=cat(id);const n=prompt('분야 이름 변경',c.name);if(!n)return;c.name=n.trim();scheduleSave();goHome();}
async function deleteCategory(id){const c=cat(id);if(!confirm(`'${c.name}' 분야와 포함된 모든 중분류·업체가 삭제됩니다. 계속할까요?`))return;categories=categories.filter(x=>x.id!==id);if(cloudOK&&sb){try{await sb.from(TABLE).delete().eq('id',id);}catch(e){}}localStorage.setItem('ollinew-data',JSON.stringify(categories));goHome();toast('분야가 삭제되었습니다','success');}

/* FILE + AI */
function attachFile(mtId,input){const f=input.files[0];if(!f)return;if(f.size>8*1024*1024){toast('8MB 이하 파일만 첨부할 수 있습니다','error');return;}const r=new FileReader();r.onload=()=>{const b64=r.result.split(',')[1];const kind=f.type==='application/pdf'?'document':'image';pendingFile[mtId]={kind,media_type:f.type,data:b64,name:f.name};rerender();};r.readAsDataURL(f);}
function clearFile(mtId,silent){delete pendingFile[mtId];if(!silent)rerender();}
async function summarizeMeeting(cid,gi,vi,mi){
  const c=cat(cid),vn=c.groups[gi].vendors[vi],mt=vn.meetings[mi];
  const raw=(mt.raw||'').trim();const pf=pendingFile[mt.id];
  if(!raw&&!pf){toast('정리할 원문을 붙여넣거나 파일을 첨부하세요','error');return;}
  aiBusy[mt.id]=true;rerender();
  try{
    const content=[];
    if(pf)content.push({type:pf.kind,source:{type:'base64',media_type:pf.media_type,data:pf.data}});
    content.push({type:'text',text:`다음은 '${vn.name}' 거래처와의 미팅에서 작성된 회의록 원문(메모/문서/이미지)입니다.\n핵심 내용을 깔끔한 한국어로 정리해줘. 자연스러운 소제목과 불릿(-)으로 구조화하되, 원문에 없는 내용은 만들지 마. 합의·결정사항과 '다음 액션'이 있으면 마지막에 따로 정리해줘. 정리된 본문만 출력해.\n\n[원문]\n${raw||'(첨부 파일 참고)'}`});
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1200,messages:[{role:'user',content}]})});
    if(!res.ok)throw new Error('http '+res.status);
    const data=await res.json();
    const text=(data.content||[]).filter(i=>i.type==='text').map(i=>i.text).join('\n').trim();
    if(!text)throw new Error('empty');
    const prev=(meetingContent(mt)||'').trim();
    mt.content=prev?(prev+'\n\n──────────\n'+text):text;
    clearFile(mt.id,true);
    toast('AI 정리 완료 — 회의 내용에 추가했습니다','success');
  }catch(e){toast('AI 정리에 실패했습니다. (Claude 앱 내 미리보기에서 동작합니다)','error');}
  aiBusy[mt.id]=false;scheduleSave();rerender();
}

/* PDF */
function printMeeting(cid,gi,vi,mi){
  const c=cat(cid),vn=c.groups[gi].vendors[vi],mt=vn.meetings[mi];
  const w=window.open('','_blank');
  w.document.write(`<html><head><meta charset="utf-8"><title>${esc(mt.title||'미팅')} - ${esc(vn.name)}</title><style>body{font-family:'Malgun Gothic',sans-serif;padding:40px;color:#161c26;line-height:1.6;}h1{font-size:19px;border-bottom:2px solid #141b27;padding-bottom:11px;}.meta{font-size:13px;color:#525c6b;margin:11px 0 22px;}.meta span{margin-right:22px;}.content{font-size:14px;white-space:pre-wrap;border:1px solid #e6e9ee;border-radius:8px;padding:14px 16px;}</style></head><body><h1>${esc(c.name)} — ${esc(vn.name)} 미팅 회의록</h1><div class="meta"><span><b>미팅명:</b> ${esc(mt.title||'-')}</span><span><b>일자:</b> ${mt.date||'-'}</span><span><b>참석자:</b> ${esc(mt.attendee||'-')}</span><span><b>상태:</b> ${stLabel(vn.status)}</span></div><div class="content">${esc(meetingContent(mt)||'-')}</div></body></html>`);
  w.document.close();setTimeout(()=>w.print(),300);
}
function esc(s){return(s==null?'':String(s)).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function toast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),2800);}
</script>

</div>

      <div class="tpl-hint">담당자별로 <b>회사 문구</b>와 <b>명함 이미지</b>를 등록하세요. 메일 발송 시 발신 담당자의 서명이 본문 아래에 자동으로 붙습니다. (팀 공용으로 저장됩니다.)</div>
